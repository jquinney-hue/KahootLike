<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxel Bit Bouncers 4.1</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; color: #fff; }
        #game-canvas { display: none; width: 100vw; height: 100vh; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(10, 10, 10, 0.98); z-index: 10; }
        .hidden { display: none !important; }
        .panel { background: #1a1a1a; padding: 30px; border-radius: 16px; box-shadow: 0 15px 40px rgba(0,0,0,0.7); text-align: center; max-width: 500px; width: 100%; border: 2px solid #333; }
        h1 { font-size: 32px; margin-bottom: 5px; color: #4CAF50; }
        input, select, button { margin: 10px 0; padding: 12px; width: 100%; border-radius: 8px; border: 1px solid #444; font-size: 16px; background: #222; color: #fff; box-sizing: border-box; }
        button { background: #4CAF50; color: white; cursor: pointer; font-weight: bold; border: none; transition: 0.2s; text-transform: uppercase; }
        button:hover { background: #45a049; }
        button.alt { background: #2196F3; }
        button.alt:hover { background: #1976D2; }
        .mode-row { display: flex; gap: 10px; }
        .mode-btn { flex: 1; background: #333; }
        .mode-btn.selected { background: #4CAF50; }
        #host-dashboard { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0a; z-index: 5; padding: 30px; box-sizing: border-box; overflow-y: auto; }
        .team-card { background: #1a1a1a; margin: 12px; padding: 20px; border-radius: 10px; border-left: 6px solid; display: inline-block; width: calc(50% - 40px); vertical-align: top;}
        #hud { position: absolute; top: 15px; left: 15px; z-index: 2; pointer-events: none; text-shadow: 2px 2px 1px #000; display: none; background: rgba(0,0,0,0.7); padding: 20px; border-radius: 10px; border: 1px solid #4CAF50; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="lobby" class="overlay">
        <div class="panel">
            <h1>Voxel Bit Bouncers 4.1</h1>
            <p style="color:#aaa;">Multiplayer Isolated Racing</p>
            <div id="join-section">
                <input type="text" id="player-name" placeholder="Your Name" />
                <input type="text" id="room-code" placeholder="Enter Room Code" />
                <button onclick="joinGame()">Join Game</button>
            </div>
            <hr style="border-color: #333; margin: 25px 0;">
            <div id="host-section">
                <h3>Host a Game</h3>
                <div class="mode-row">
                    <button class="mode-btn selected" id="m-solo" onclick="setMode(1)">Solo</button>
                    <button class="mode-btn" id="m-duo" onclick="setMode(2)">Duo</button>
                    <button class="mode-btn" id="m-team3" onclick="setMode(3)">Team 3</button>
                    <button class="mode-btn" id="m-team4" onclick="setMode(4)">Team 4</button>
                </div>
                <button class="alt" onclick="hostGame()">Create Room</button>
            </div>
        </div>
    </div>

    <div id="host-dashboard" class="hidden">
        <h1>Host Room: <span id="host-room-code" style="color: #4CAF50;"></span></h1>
        <div id="teams-container"></div>
    </div>

    <div id="hud">
        <h2 id="hud-team-name" style="margin:0 0 10px 0; color: #fff;">...</h2>
        <h3 style="margin:0; font-size: 20px; color: #4CAF50;">Level <span id="hud-level">1</span>: <span id="hud-topic">...</span></h3>
        <p>Jump on blocks to enter answers, bounce on GREEN to submit, RED to clear!</p>
    </div>

    <canvas id="game-canvas"></canvas>

    <script>
        // ==========================================
        // 1. FIREBASE & DATA
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCIZpaHCz9vRemyqjEAhGt0v1A5C4eqZVc",
            authDomain: "test-d4c00.firebaseapp.com",
            databaseURL: "https://test-d4c00-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "test-d4c00"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const DB_ROOT = 'voxel_bit_game_v6'; 

        let currentRoom = null, playerId = null, isHost = false, selectedTeamSize = 1;
        
        const TEAMS = [
            { name: "Red Lions", color: "#F44336", startX: -75 },
            { name: "Blue Falcons", color: "#2196F3", startX: -25 },
            { name: "Green Turtles", color: "#4CAF50", startX: 25 },
            { name: "Yellow Cheetahs", color: "#FFEB3B", startX: 75 }
        ];
        let myTeamData = null;

        const LEVELS = [
            { id: 1, topic: "Binary to Denary", problem: "Calculate the denary of: 1001", inputType: "DENARY_PAD", target: "9" },
            { id: 2, topic: "Binary to Denary", problem: "Calculate the denary of: 11010", inputType: "DENARY_PAD", target: "26" },
            { id: 3, topic: "Denary to Binary", problem: "Convert this denary: 14", inputType: "BINARY_FLIP", target: "1110", bits: 4 },
            { id: 4, topic: "Denary to Binary", problem: "Convert this denary: 45", inputType: "BINARY_FLIP", target: "101101", bits: 6 },
            { id: 5, topic: "Binary Addition", problem: "  010\n+ 011", isGrid: true, inputType: "BINARY_FLIP", target: "101", bits: 3 },
            { id: 6, topic: "Binary Addition", problem: "  1011\n+ 0111", isGrid: true, inputType: "BINARY_FLIP", target: "10010", bits: 5 },
            { id: 7, topic: "Hex to Denary", problem: "Calculate the denary of Hex: A", inputType: "DENARY_PAD", target: "10" },
            { id: 8, topic: "Hex to Denary", problem: "Calculate the denary of Hex: 1F", inputType: "DENARY_PAD", target: "31" },
            { id: 9, topic: "Denary to Hex", problem: "Convert this denary to Hex: 12", inputType: "HEX_PAD", target: "C" },
            { id: 10, topic: "Denary to Hex", problem: "Convert this denary to Hex: 42", inputType: "HEX_PAD", target: "2A" }
        ];
        let globalCurrentLevel = 0; 

        function setMode(size) {
            selectedTeamSize = size;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
            document.querySelectorAll('.mode-btn')[size-1].classList.add('selected');
        }

        function hostGame() {
            currentRoom = Math.floor(1000 + Math.random() * 9000).toString(); isHost = true;
            
            let initialTeamProgress = {};
            TEAMS.forEach(t => {
                let initialAnswers = {};
                LEVELS.forEach((lvl, i) => initialAnswers[i] = lvl.inputType === "BINARY_FLIP" ? new Array(lvl.bits).fill('0').join('') : "");
                initialTeamProgress[t.name] = { currentLevel: 0, score: 0, answers: initialAnswers };
            });

            db.ref(`${DB_ROOT}/${currentRoom}`).set({ status: 'playing', teamSize: selectedTeamSize, teamProgress: initialTeamProgress });
            
            document.getElementById('lobby').classList.add('hidden'); document.getElementById('host-dashboard').classList.remove('hidden');
            document.getElementById('host-room-code').innerText = currentRoom;

            db.ref(`${DB_ROOT}/${currentRoom}`).on('value', snap => updateHostDashboard(snap.val()));
        }

        function joinGame() {
            const name = document.getElementById('player-name').value; const room = document.getElementById('room-code').value;
            if (!name || !room) return alert("Enter name and room code!");
            db.ref(`${DB_ROOT}/${room}`).once('value').then(snap => {
                if(!snap.val()) return alert("Room not found!");
                currentRoom = room; playerId = 'player_' + Math.random().toString(36).substr(2, 9);
                
                const pCount = snap.val().players ? Object.keys(snap.val().players).length : 0;
                myTeamData = TEAMS[pCount % TEAMS.length];

                db.ref(`${DB_ROOT}/${currentRoom}/players/${playerId}`).set({ 
                    name: name, team: myTeamData.name, color: myTeamData.color, 
                    x: myTeamData.startX, y: 5, z: 10, r: 0 
                });

                document.getElementById('lobby').classList.add('hidden'); document.getElementById('game-canvas').style.display = 'block'; document.getElementById('hud').style.display = 'block';
                document.getElementById('hud-team-name').innerText = myTeamData.name;
                document.getElementById('hud-team-name').style.color = myTeamData.color;

                init3D(name);
            });
        }

        function updateHostDashboard(gameData) {
            if (!gameData) return;
            const c = document.getElementById('teams-container'); c.innerHTML = '';
            
            TEAMS.forEach(team => {
                const prog = gameData.teamProgress ? gameData.teamProgress[team.name] : { score: 0, currentLevel: 0 };
                const players = gameData.players ? Object.values(gameData.players).filter(p => p.team === team.name).map(p => p.name) : [];
                
                c.innerHTML += `
                    <div class="team-card" style="border-left-color: ${team.color}">
                        <h2>${team.name}</h2>
                        <div style="font-size:20px; font-weight:bold;">Level: ${(prog.currentLevel || 0) + 1}/10</div>
                        <div style="font-size:16px; color:#aaa;">Score: ${prog.score || 0}</div>
                        <p style="color:#888;">Members: ${players.join(', ') || 'Waiting...'}</p>
                    </div>`;
            });
        }

        // ==========================================
        // 2. THREE.JS ENGINE & LOCAL TRACK ONLY
        // ==========================================
        let scene, camera, renderer, playerObj;
        let remotePlayers = {}; 
        let keys = {};
        const ROOM_LENGTH = 50; 
        
        let interactiveBlocks = [], checkPads = [], clearPads = [], voxelGates = [], displayBoards = [];
        let velocity = new THREE.Vector3(), gravity = -0.015, isGrounded = false;
        let lastNetworkTick = 0; 

        function createGrassTexture() {
            const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 512; const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#4CAF50'; ctx.fillRect(0, 0, 512, 512); 
            for(let i=0; i<3000; i++) { ctx.fillStyle = Math.random() < 0.3 ? '#66BB6A' : '#7cb342'; ctx.fillRect(Math.random()*512, Math.random()*512, 4, 4); }
            return new THREE.CanvasTexture(canvas);
        }

        function createTextTexture(text, bg, fg, width, height, size, isGrid=false) {
            const canvas = document.createElement('canvas'); 
            canvas.width = width; canvas.height = height; 
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = bg; ctx.fillRect(0, 0, width, height);
            ctx.fillStyle = fg; ctx.textBaseline = 'middle';
            
            if (isGrid) {
                ctx.font = `bold ${size}px Courier New`; ctx.textAlign = 'right';
                const lines = text.split('\n');
                ctx.fillText(lines[0], width/2 + 80, height/2 - 40); 
                ctx.fillText(lines[1], width/2 + 80, height/2 + 40);
                ctx.strokeStyle = fg; ctx.lineWidth = 5; 
                ctx.beginPath(); ctx.moveTo(width/2 - 120, height/2 + 65); ctx.lineTo(width/2 + 100, height/2 + 65); ctx.stroke();
            } else {
                ctx.font = `bold ${size}px Arial`; ctx.textAlign = 'center';
                ctx.fillText(text, width/2, height/2);
            }
            return new THREE.CanvasTexture(canvas);
        }

        function createNameTag(name) {
            const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 64; const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.roundRect(0, 0, 256, 64, 10); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.font = 'bold 30px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(name, 128, 32);
            const tex = new THREE.CanvasTexture(canvas); const mat = new THREE.SpriteMaterial({ map: tex });
            const sprite = new THREE.Sprite(mat); sprite.scale.set(4, 1, 1); sprite.position.y = 4;
            return sprite;
        }

        function createVoxelHuman(colorStr, name) {
            const group = new THREE.Group();
            const mat = new THREE.MeshLambertMaterial({color: colorStr}); const skin = new THREE.MeshLambertMaterial({color: "#FBC02D"});
            
            const torso = new THREE.Mesh(new THREE.BoxGeometry(1, 1.5, 0.5), mat); torso.position.y = 1.5; group.add(torso);
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), skin); head.position.y = 2.75; group.add(head);
            
            const lArm = new THREE.Group(); lArm.position.set(-0.7, 2.0, 0); 
            const lArmMesh = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.4, 0.4), skin); lArmMesh.position.y = -0.7; lArm.add(lArmMesh); group.add(lArm);
            
            const rArm = new THREE.Group(); rArm.position.set(0.7, 2.0, 0);
            const rArmMesh = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.4, 0.4), skin); rArmMesh.position.y = -0.7; rArm.add(rArmMesh); group.add(rArm);
            
            const lLeg = new THREE.Group(); lLeg.position.set(-0.3, 1.2, 0);
            const lLegMesh = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.2, 0.4), new THREE.MeshLambertMaterial({color:"#444"})); 
            lLegMesh.position.y = -0.6; lLeg.add(lLegMesh); group.add(lLeg);
            
            const rLeg = new THREE.Group(); rLeg.position.set(0.3, 1.2, 0);
            const rLegMesh = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.2, 0.4), new THREE.MeshLambertMaterial({color:"#444"})); 
            rLegMesh.position.y = -0.6; rLeg.add(rLegMesh); group.add(rLeg);

            group.add(createNameTag(name));
            group.userData = { lArm, rArm, lLeg, rLeg };
            return group;
        }

        function init3D(playerName) {
            scene = new THREE.Scene(); camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), antialias: true }); renderer.setSize(window.innerWidth, window.innerHeight);

            const skyCanvas = document.createElement('canvas'); skyCanvas.width = 1; skyCanvas.height = 128; const ctx = skyCanvas.getContext('2d');
            const grd = ctx.createLinearGradient(0, 0, 0, 128); grd.addColorStop(0, '#1976D2'); grd.addColorStop(1, '#81D4FA'); ctx.fillStyle = grd; ctx.fillRect(0,0,1,128);
            scene.background = new THREE.CanvasTexture(skyCanvas);
            
            scene.add(new THREE.AmbientLight(0xffffff, 0.7)); 
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.6); dirLight.position.set(10, 50, 10); scene.add(dirLight);

            generateLocalTrackOnly();

            playerObj = createVoxelHuman(myTeamData.color, playerName); 
            playerObj.position.set(myTeamData.startX, 5, 10); scene.add(playerObj);

            window.addEventListener('keydown', e => { keys[e.code] = true; }); window.addEventListener('keyup', e => { keys[e.code] = false; });

            // Listen to remote players (FILTERED: Teammates ONLY)
            db.ref(`${DB_ROOT}/${currentRoom}/players`).on('value', snap => {
                const players = snap.val() || {};
                Object.keys(players).forEach(id => {
                    if (id === playerId) return; 
                    const data = players[id];
                    
                    // PERFORMANCE FIX: Ignore players not on our team
                    if (data.team !== myTeamData.name) {
                        if (remotePlayers[id]) { scene.remove(remotePlayers[id]); delete remotePlayers[id]; }
                        return; 
                    }

                    if (!remotePlayers[id]) {
                        remotePlayers[id] = createVoxelHuman(data.color, data.name); scene.add(remotePlayers[id]);
                    }
                    remotePlayers[id].userData.targetX = data.x; remotePlayers[id].userData.targetY = data.y; remotePlayers[id].userData.targetZ = data.z; remotePlayers[id].userData.targetR = data.r;
                });
                
                Object.keys(remotePlayers).forEach(id => {
                    if (!players[id] || players[id].team !== myTeamData.name) { scene.remove(remotePlayers[id]); delete remotePlayers[id]; }
                });
            });

            // Sync Game State for MY TEAM ONLY
            db.ref(`${DB_ROOT}/${currentRoom}/teamProgress/${myTeamData.name}`).on('value', snap => {
                const tProg = snap.val(); if(!tProg) return;
                
                globalCurrentLevel = tProg.currentLevel || 0;
                if(LEVELS[globalCurrentLevel]) { 
                    document.getElementById('hud-level').innerText = globalCurrentLevel + 1; 
                    document.getElementById('hud-topic').innerText = LEVELS[globalCurrentLevel].topic; 
                }

                voxelGates.forEach(gate => { 
                    if (gate.levelIndex < tProg.currentLevel) gate.isOpening = true; 
                });

                const ans = tProg.answers;
                if(ans) {
                    interactiveBlocks.forEach(b => {
                        if(b.type === "BINARY") {
                            const str = ans[b.levelIndex];
                            if (str && str[b.bitIndex] !== undefined) {
                                const char = str[b.bitIndex];
                                if(b.value !== char) {
                                    b.value = char; 
                                    b.mesh.material.map = createTextTexture(char, char === '0' ? '#2196F3' : '#FFEB3B', '#000', 256, 256, 120); 
                                    b.mesh.material.needsUpdate = true;
                                }
                            }
                        }
                    });

                    displayBoards.forEach(board => {
                        const currentStr = ans[board.levelIndex] || "_";
                        board.mesh.material.map = createTextTexture(currentStr, '#222', '#0f0', 1024, 256, 100); 
                        board.mesh.material.needsUpdate = true;
                    });
                }
            });

            animate();
        }

        function generateLocalTrackOnly() {
            const grassTex = createGrassTexture(); grassTex.wrapS = grassTex.wrapT = THREE.RepeatWrapping; grassTex.repeat.set(5, 200);
            
            // PERFORMANCE FIX: Only build the scene for myTeamData
            const team = myTeamData;

            const floor = new THREE.Mesh(new THREE.BoxGeometry(40, 1, ROOM_LENGTH * 11), new THREE.MeshLambertMaterial({ map: grassTex })); 
            floor.position.set(team.startX, -0.5, -(ROOM_LENGTH * 4.5) + 10); scene.add(floor);

            LEVELS.forEach((lvl, i) => {
                const rZ = -(i * ROOM_LENGTH);

                if (lvl.isGrid) {
                    const qPlane = new THREE.Mesh(new THREE.PlaneGeometry(12, 12), new THREE.MeshBasicMaterial({ map: createTextTexture(lvl.problem, '#333', '#FFF', 512, 512, 80, true) }));
                    qPlane.rotation.x = -Math.PI/2; qPlane.position.set(team.startX, 0.02, rZ + 5); scene.add(qPlane);
                } else {
                    const qPlane = new THREE.Mesh(new THREE.PlaneGeometry(24, 6), new THREE.MeshBasicMaterial({ map: createTextTexture(lvl.problem, '#333', '#FFF', 1024, 256, 60, false) }));
                    qPlane.rotation.x = -Math.PI/2; qPlane.position.set(team.startX, 0.02, rZ + 5); scene.add(qPlane);
                }

                if (lvl.inputType === "BINARY_FLIP") {
                    const sX = team.startX - ((lvl.bits - 1) * 3) / 2;
                    for(let b=0; b<lvl.bits; b++) {
                        const bMesh = new THREE.Mesh(new THREE.BoxGeometry(2,2,2), new THREE.MeshLambertMaterial({ map: createTextTexture('0', '#2196F3', '#000', 256, 256, 120) }));
                        bMesh.position.set(sX + (b * 3), 1, rZ - 5); scene.add(bMesh);
                        interactiveBlocks.push({ mesh: bMesh, levelIndex: i, type: "BINARY", bitIndex: b, value: '0' });
                    }
                } else if (lvl.inputType === "DENARY_PAD" || lvl.inputType === "HEX_PAD") {
                    
                    const dMesh = new THREE.Mesh(new THREE.PlaneGeometry(12, 3), new THREE.MeshBasicMaterial({ map: createTextTexture("_", '#222', '#0f0', 1024, 256, 100) }));
                    dMesh.position.set(team.startX, 6, rZ - 8); scene.add(dMesh); displayBoards.push({ mesh: dMesh, levelIndex: i });

                    const padKeys = lvl.inputType === "DENARY_PAD" ? ['1','2','3','4','5','6','7','8','9','0'] : ['A','B','C','D','E','F','7','8','9','4','5','6','1','2','3','0'];
                    const cols = lvl.inputType === "HEX_PAD" ? 4 : 3;
                    const kStartX = team.startX - ((cols-1)*2.5)/2;
                    
                    padKeys.forEach((char, idx) => {
                        const row = Math.floor(idx / cols); 
                        let col = idx % cols;
                        if(lvl.inputType === "DENARY_PAD" && char === '0') col = 1;

                        const kMesh = new THREE.Mesh(new THREE.BoxGeometry(2, 0.5, 2), new THREE.MeshLambertMaterial({ map: createTextTexture(char, '#555', '#FFF', 256, 256, 120) }));
                        kMesh.position.set(kStartX + (col * 2.5), 0.25, rZ - 2 - (row * 2.5)); scene.add(kMesh);
                        interactiveBlocks.push({ mesh: kMesh, levelIndex: i, type: "PAD", char: char });
                    });
                }

                const checkMesh = new THREE.Mesh(new THREE.BoxGeometry(4, 0.5, 4), new THREE.MeshLambertMaterial({ color: 0x4CAF50 }));
                checkMesh.position.set(team.startX + 4, 0.25, rZ - 18); scene.add(checkMesh); checkPads.push({ mesh: checkMesh, levelIndex: i });

                const clearMesh = new THREE.Mesh(new THREE.BoxGeometry(4, 0.5, 4), new THREE.MeshLambertMaterial({ color: 0xFF5252 }));
                clearMesh.position.set(team.startX - 4, 0.25, rZ - 18); scene.add(clearMesh); clearPads.push({ mesh: clearMesh, levelIndex: i });

                const gate = new THREE.Group();
                for(let x=-20; x<=20; x+=2) for(let y=1; y<=8; y+=2) {
                    const v = new THREE.Mesh(new THREE.BoxGeometry(2,2,2), new THREE.MeshLambertMaterial({ color: team.color })); v.position.set(x,y,0); gate.add(v);
                }
                gate.position.set(team.startX, 0, rZ - 25); scene.add(gate); voxelGates.push({ group: gate, levelIndex: i, isOpening: false });
            });
        }

        // ==========================================
        // 3. GAME LOOP & PHYSICS
        // ==========================================
        let lastInteractionTime = 0;

        function animate() {
            requestAnimationFrame(animate);
            if(isHost || !playerObj || !myTeamData) return; 

            const time = Date.now();

            let moveX = 0, moveZ = 0; const speed = 0.22;
            if (keys['KeyW'] || keys['ArrowUp']) moveZ -= speed;
            if (keys['KeyS'] || keys['ArrowDown']) moveZ += speed;
            if (keys['KeyA'] || keys['ArrowLeft']) moveX -= speed;
            if (keys['KeyD'] || keys['ArrowRight']) moveX += speed;

            playerObj.position.x += moveX; playerObj.position.z += moveZ;
            
            if(playerObj.position.x > myTeamData.startX + 19) playerObj.position.x = myTeamData.startX + 19; 
            if(playerObj.position.x < myTeamData.startX - 19) playerObj.position.x = myTeamData.startX - 19;
            
            if (moveX !== 0 || moveZ !== 0) { playerObj.rotation.y = Math.atan2(moveX, moveZ); }

            velocity.y += gravity; playerObj.position.y += velocity.y; isGrounded = false;
            if (playerObj.position.y <= 0) { playerObj.position.y = 0; velocity.y = 0; isGrounded = true; }
            if (keys['Space'] && isGrounded) { velocity.y = 0.45; }

            const animateLimbs = (group, isMoving) => {
                if (isMoving && group.position.y <= 0.5) { 
                    const swing = Math.sin(time * 0.015) * 0.8;
                    group.userData.lArm.rotation.x = swing; group.userData.rArm.rotation.x = -swing;
                    group.userData.lLeg.rotation.x = -swing; group.userData.rLeg.rotation.x = swing;
                } else {
                    group.userData.lArm.rotation.x = 0; group.userData.rArm.rotation.x = 0;
                    group.userData.lLeg.rotation.x = 0; group.userData.rLeg.rotation.x = 0;
                }
            };
            animateLimbs(playerObj, moveX !== 0 || moveZ !== 0);

            if (time - lastNetworkTick > 100) { 
                db.ref(`${DB_ROOT}/${currentRoom}/players/${playerId}`).update({ x: playerObj.position.x, y: playerObj.position.y, z: playerObj.position.z, r: playerObj.rotation.y });
                lastNetworkTick = time;
            }

            Object.values(remotePlayers).forEach(rp => {
                if(rp.userData.targetX !== undefined) {
                    const dx = rp.userData.targetX - rp.position.x; const dz = rp.userData.targetZ - rp.position.z;
                    rp.position.x += dx * 0.2; rp.position.y += (rp.userData.targetY - rp.position.y) * 0.2; rp.position.z += dz * 0.2;
                    let diff = rp.userData.targetR - rp.rotation.y;
                    while (diff < -Math.PI) diff += Math.PI * 2; while (diff > Math.PI) diff -= Math.PI * 2;
                    rp.rotation.y += diff * 0.2;
                    animateLimbs(rp, Math.abs(dx) > 0.05 || Math.abs(dz) > 0.05);
                }
            });

            voxelGates.forEach(gate => {
                if (gate.isOpening && gate.group.position.y < 30) gate.group.position.y += 0.2;
                if (!gate.isOpening && Math.abs(playerObj.position.z - gate.group.position.z) < 2 && playerObj.position.z > gate.group.position.z) {
                    playerObj.position.z = gate.group.position.z + 2; 
                }
            });

            const pAABB = new THREE.Box3().setFromObject(playerObj);

            if (velocity.y < 0) { 
                interactiveBlocks.forEach(b => {
                    if (b.levelIndex !== globalCurrentLevel) return;
                    if (pAABB.intersectsBox(new THREE.Box3().setFromObject(b.mesh)) && playerObj.position.y > b.mesh.position.y - 0.5) {
                        if (time - lastInteractionTime > 400) {
                            velocity.y = 0.35; lastInteractionTime = time; 
                            
                            db.ref(`${DB_ROOT}/${currentRoom}/teamProgress/${myTeamData.name}/answers/${b.levelIndex}`).once('value').then(snap => {
                                let ans = snap.val() || "";
                                if (b.type === "BINARY") {
                                    if (!ans) ans = "0".repeat(LEVELS[b.levelIndex].bits);
                                    let arr = ans.split(''); arr[b.bitIndex] = arr[b.bitIndex] === '0' ? '1' : '0';
                                    db.ref(`${DB_ROOT}/${currentRoom}/teamProgress/${myTeamData.name}/answers/${b.levelIndex}`).set(arr.join(''));
                                } else if (b.type === "PAD") {
                                    if(ans.length < 10) db.ref(`${DB_ROOT}/${currentRoom}/teamProgress/${myTeamData.name}/answers/${b.levelIndex}`).set(ans + b.char);
                                }
                            });
                        }
                    }
                });

                checkPads.forEach(pad => {
                    if (pad.levelIndex !== globalCurrentLevel) return;
                    if (pAABB.intersectsBox(new THREE.Box3().setFromObject(pad.mesh)) && playerObj.position.y > pad.mesh.position.y - 0.5) {
                        if (time - lastInteractionTime > 1500) {
                            velocity.y = 0.5; lastInteractionTime = time; 
                            db.ref(`${DB_ROOT}/${currentRoom}/teamProgress/${myTeamData.name}/answers/${pad.levelIndex}`).once('value').then(snap => {
                                if ((snap.val() || "") === LEVELS[pad.levelIndex].target) {
                                    db.ref(`${DB_ROOT}/${currentRoom}/teamProgress/${myTeamData.name}/score`).transaction(s => (s||0) + 200);
                                    db.ref(`${DB_ROOT}/${currentRoom}/teamProgress/${myTeamData.name}/currentLevel`).set(pad.levelIndex + 1);
                                } else {
                                    db.ref(`${DB_ROOT}/${currentRoom}/teamProgress/${myTeamData.name}/score`).transaction(s => (s||0) - 25);
                                }
                            });
                        }
                    }
                });

                clearPads.forEach(pad => {
                    if (pad.levelIndex !== globalCurrentLevel) return;
                    if (pAABB.intersectsBox(new THREE.Box3().setFromObject(pad.mesh)) && playerObj.position.y > pad.mesh.position.y - 0.5) {
                        if (time - lastInteractionTime > 1000) {
                            velocity.y = 0.4; lastInteractionTime = time; 
                            if (LEVELS[pad.levelIndex].inputType !== "BINARY_FLIP") {
                                db.ref(`${DB_ROOT}/${currentRoom}/teamProgress/${myTeamData.name}/answers/${pad.levelIndex}`).set(""); 
                            }
                        }
                    }
                });
            }

            camera.position.set(playerObj.position.x, playerObj.position.y + 12, playerObj.position.z + 18);
            camera.lookAt(playerObj.position.x, playerObj.position.y + 2, playerObj.position.z);
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => { if(camera && renderer) { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); } });
    </script>
</body>
</html>
